name: docker-image

# Prebuilt images for #125: pushed on release tags and manual dispatch.
# ghcr.io/quentinfuxa/whisperlivekit:<tag>[-qwen3] (+ :latest aliases)
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (defaults to the ref name)"
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - extras: cu129
            suffix: ""
          - extras: cu129,qwen3-streaming
            suffix: "-qwen3"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        # GHCR repository names must be lowercase; the owner login is not.
        run: |
          echo "value=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            EXTRAS=${{ matrix.extras }}
          tags: |
            ghcr.io/${{ steps.tag.outputs.owner }}/whisperlivekit:${{ steps.tag.outputs.value }}${{ matrix.suffix }}
            ghcr.io/${{ steps.tag.outputs.owner }}/whisperlivekit:latest${{ matrix.suffix }}
          cache-from: type=gha,scope=wlk${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=wlk${{ matrix.suffix }}
